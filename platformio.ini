; PlatformIO Configuration for Self-Balancing Motorcycle
; Arduino Engineering Kit Rev2 - Arduino Nano 33 IoT + Nano Motor Carrier

[env:nano33iot]
platform = atmelsam
board = nano_33_iot
framework = arduino

; Serial monitor
monitor_speed = 115200

; Libraries
lib_deps =
    arduino-libraries/ArduinoMotorCarrier@^2.0.0
    arduino-libraries/Arduino_LSM6DS3@^1.0.2
    arduino-libraries/ArduinoOTA@^1.0.9
    arduino-libraries/WiFiNINA@^1.8.14

; Build flags
build_flags =
    -DARDUINO_SAMD_NANO_33_IOT
    -Wall

; --- OTA Upload Configuration ---
; Uncomment and set your board's IP to enable wireless upload:
; upload_protocol = espota
; upload_port = 192.168.1.XXX
